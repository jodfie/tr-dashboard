services:
  tr-dashboard:
    image: ghcr.io/lumenprima/tr-dashboard:latest
    # Or build from source:
    # build: .
    ports:
      - "80:80"
    environment:
      - TR_ENGINE_URL=tr-engine:8000
      - TR_AUTH_TOKEN=

